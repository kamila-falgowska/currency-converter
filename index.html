<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator walut</title>
    <link rel="icon" href="image/icon-currency-converter.png">
    <meta property="og:image" content="image/Currency-converter.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css"
        integrity="sha512-NhSC1YmyruXifcj/KFRWoC561YpHpc5Jtzgvbuzx5VozKpWvQ+4nXhPdFgmx8xqexRcpAglTj9sIBWINXa8x5w=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/form.css">
    <script defer src="js/script.js"></script>
</head>

<body class="body">
    <form class="form js-form">
        <fieldset class="form__fieldset">
            <legend class="form__legend">Kalkulator walut</legend>
            <p>
                <label>
                    <span class="form__label">Wybierz walutę</span>
                    <select class="form__field js-currency" name="currency">
                        <option value="EUR">EUR</option>
                        <option value="USD">USD</option>
                        <option value="NOK">NOK</option>
                    </select>
                </label>
            </p>
            <p>
                <label>
                    <span class="form__label">Wpisz kwotę*</span>
                    <input class="form__field js-amount" type="number" min="1" step="any" required>
                </label>
            </p>
        </fieldset>
        <p>
            <button class="form__button">Przelicz</button>
        </p>
        <p class="form__info">Kursy pochodzą ze strony nbp.pl z Tabeli nr 096/A/NBP/2023 z dnia 2023-05-17</p>
        <p class="form__result"><strong class="js-result"></strong></p>
    </form>
</body>

</html>
